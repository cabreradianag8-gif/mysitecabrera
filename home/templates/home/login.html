<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Velvet Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --velvet-deep: #1e0b14;
            --velvet-med: #361827;
            --rose-gold: #e5a9a9;
            --blush-pink: #fbcbc9;
            --blanco-puro: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--velvet-deep) 0%, #29101c 100%);
            color: #fcefe6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background-color: var(--blanco-puro);
            color: #2d1622;
            border-radius: 26px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
            max-width: 420px;
            width: 100%;
            padding: 40px 30px;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 0.5px;
            color: var(--velvet-deep);
        }
        
        .brand-logo span {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            background: linear-gradient(135deg, #a64b6b, var(--velvet-med));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-premium {
            background-color: var(--velvet-med);
            color: var(--blanco-puro);
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            background-color: var(--velvet-deep);
            color: var(--rose-gold);
            box-shadow: 0 4px 15px rgba(54, 24, 39, 0.4);
        }

        .form-control:focus {
            border-color: var(--rose-gold);
            box-shadow: 0 0 0 0.25rem rgba(229, 169, 169, 0.25);
        }
    </style>
</head>
<body>

    <div class="login-card text-center animate__animated animate__fadeIn">
        
        <!-- Logo -->
        <div class="mb-4">
            <i class="bi bi-stars fs-1" style="color: #a64b6b;"></i>
            <h1 class="brand-logo mt-2 mb-1">GLOW&<span>Beauty</span></h1>
            <p class="text-muted small fw-medium">Velvet Portal · Control de Accesos</p>
        </div>

        <!-- Alertas de error -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger alert-dismissible fade show small py-2 text-start" role="alert">
                    <i class="bi bi-excellence-triangle-fill me-1"></i> {{ message }}
                    <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <!-- Formulario -->
        <form action="{% url 'login' %}" method="POST" class="text-start small">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-person"></i></span>
                    <input type="text" name="usuario" class="form-control bg-light border-start-0" placeholder="Ej: valeria_mendoza" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-secondary">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control bg-light border-start-0" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-premium w-100 py-2.5 fw-bold shadow-sm mb-2">
                <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar al Sistema
            </button>
        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
