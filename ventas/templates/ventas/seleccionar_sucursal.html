{% extends 'base.html' %}
{% block title %}Seleccionar Sucursal | Glow & Beauty{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 text-center">
        <i class="bi bi-geo-alt-fill display-2 mb-3" style="color: #a64b6b;"></i>
        <h3 style="font-family: 'Playfair Display', serif;" class="fw-bold text-dark">Punto de Acceso Comercial</h3>
        <p class="text-muted small mb-4">Antes de realizar ventas, confirma la sucursal física en la que te encuentras operando el día de hoy.</p>
        
        <div class="card border-0 shadow-sm p-4 rounded-4 bg-light">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Establecimiento Disponible</label>
                    <select name="sucursal_id" class="form-select form-select-lg" style="font-size: 1rem;" required>
                        <option value="">-- Elige la sucursal actual --</option>
                        {% for s in sucursales %}
                            <option value="{{ s.id }}">{{ s.nombre }} ({{ s.ciudad }})</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn text-white w-100 fw-bold py-2.5" style="background-color: #361827;">
                    Iniciar Turno de Ventas <i class="bi bi-arrow-right-short ms-1"></i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
